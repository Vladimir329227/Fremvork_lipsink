# LipSync Framework — Base Configuration
# All values can be overridden via CLI flags or LipSyncConfig constructor.

# ---------------------------------------------------------------------------
# Model architecture
# ---------------------------------------------------------------------------
model:
  # Audio encoder (Conformer)
  n_mels: 80
  audio_d_model: 256
  audio_heads: 4
  audio_layers: 6
  audio_embed_dim: 512

  # Identity encoder (ResNet-18)
  identity_embed_dim: 512
  pretrained_identity: true

  # Generator (U-Net)
  gen_in_channels: 4         # 3 RGB + 1 mask channel
  gen_base_ch: 64
  gen_depth: 4               # encoder/decoder levels

  # Discriminator (PatchGAN)
  disc_in_channels: 3
  disc_base_ch: 64

  # SyncNet
  sync_embed_dim: 256

# ---------------------------------------------------------------------------
# Lip-sync specific processing parameters
# ---------------------------------------------------------------------------
audio:
  sample_rate: 16000
  n_mels: 80
  window: 16

video:
  face_size: 256
  lip_size: 96
  target_fps: 25.0

lipsync:
  sync_window: 5
  temporal_radius: 2
  mouth_region_weight: 1.0

inference:
  smoothing: 0.0
  paste_mode: direct            # direct | seamless
  keep_original_audio: true
  # After batch infer, mux driving WAV (or audio from video) into output MP4 via ffmpeg.
  mux_driving_audio: true
  # Rows above this fraction of face height stay original (no generator blend).
  mouth_blend_from: 0.42
  # Pool Conformer time axis: last = frame-aligned (recommended); mean averages the window.
  audio_embed_pool: last        # mean | last
  # paste: raw generator RGB in ROI — often looks like a noise rectangle if the G is weak.
  # blend: alpha*rgb + (1-alpha)*face (recommended; matches generator sigmoid alpha head).
  mouth_composite_mode: blend
  # lip_box = only central mouth ROI (Wav2Lip-style); lower_half = legacy full lower face.
  mouth_composite_scope: lip_box
  lip_roi_y0: 0.52
  lip_roi_y1: 0.86
  lip_roi_x0: 0.22
  lip_roi_x1: 0.78
  # Edge blend width (pixels) on the lip ROI; softens the box boundary on 256² crops.
  lip_roi_feather_px: 6
  mouth_alpha_min: 0.45

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
optimizer:
  name: adamw                 # sgd | momentum_sgd | clipping_sgd | adamw | lion
  lr: 2.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  # d_lr: 1.0e-4             # separate discriminator LR (defaults to lr)
  # lookahead: false
  gradient_clipping:
    enabled: true
    max_norm: 1.0
    norm_type: 2

# ---------------------------------------------------------------------------
# LR Scheduler
# ---------------------------------------------------------------------------
scheduler:
  name: warmup_cosine
  warmup_steps: 2000
  T_max: 200000
  eta_min: 1.0e-6

# ---------------------------------------------------------------------------
# Loss functions
# ---------------------------------------------------------------------------
losses:
  huber_delta: 1.0
  # Extra Huber weight on lip ROI pixels (lip_box composite). Stops "good" full-frame val_loss
  # while the mouth patch is still noise. See Wav2Lip-style strong L1 on the synthesized region.
  lip_recon_boost: 14.0
  perceptual_layers: [relu3_3, relu4_3]
  adv_mode: hinge             # hinge | lsgan | bce | wgan

  # Loss weights
  w_recon: 10.0
  # Lower than 1.0: perceptual alone can favor texture over correct lip pixels (blur / garbage in ROI).
  w_perceptual: 0.45
  w_sync: 0.35
  w_temporal: 0.1
  w_adv: 1.0
  # Penalise low alpha in the lower face (stops "invisible" generator / static mouth).
  w_mouth_alpha: 0.12
  mouth_alpha_target: 0.28

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
epochs: 100
batch_size: 8
fp16: true
gradient_checkpointing: false

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  train_root: data/train
  val_root: data/val
  audio_window: 16            # mel frames per sample
  face_size: 256
  lip_size: 96
  # During training, with this probability use frame-0 as driving face input.
  # Improves one-image (static portrait) lip-sync instead of only video-to-video.
  static_face_prob: 0.7
  augment: true
  num_workers: 4

# ---------------------------------------------------------------------------
# Super-resolution
# ---------------------------------------------------------------------------
use_super_resolution: false
sr_backend: gfpgan            # gfpgan | codeformer | realesrgan

# ---------------------------------------------------------------------------
# Logging & checkpoints
# ---------------------------------------------------------------------------
checkpoint_dir: checkpoints
log_wandb: false
wandb_project: lipsync
save_every_n_epochs: 5

# Reproducibility
deterministic: false
seed: 42

# Runtime profile (cpu-safe | gpu-fast | gpu-quality)
runtime:
  profile: gpu-fast
  prefer_onnx: false
  use_torchscript: false
