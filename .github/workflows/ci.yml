name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
